name: Android

on:
  push:
    branches: [main, dev, "feat/**"]
    tags:
      - "v*-android"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android (libbox + APK + AAB)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Setup Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-android-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-android-cargo-

      - name: Cache go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-libbox-${{ hashFiles('scripts/build-libbox.sh') }}
          restore-keys: ${{ runner.os }}-go-libbox-

      - name: Cache libbox.aar
        id: libbox-cache
        uses: actions/cache@v4
        with:
          path: tauri-plugin-mintvpn/android/libs/libbox.aar
          # Bust whenever the build script changes (which contains the
          # sing-box version + tags).
          key: ${{ runner.os }}-libbox-aar-${{ hashFiles('scripts/build-libbox.sh') }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ""

      - name: Install Android NDK + platforms + build-tools
        run: |
          set -e
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;26.1.10909125" "platform-tools"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Build libbox.aar
        if: steps.libbox-cache.outputs.cache-hit != 'true'
        run: ./scripts/build-libbox.sh

      - name: Verify libbox.aar present
        run: |
          if [ ! -s tauri-plugin-mintvpn/android/libs/libbox.aar ]; then
            echo "::error::libbox.aar is missing or empty"
            ls -la tauri-plugin-mintvpn/android/libs/ || true
            exit 1
          fi
          ls -la tauri-plugin-mintvpn/android/libs/

      - name: Install npm deps
        run: npm ci

      - name: Decode release keystore
        id: keystore
        env:
          KS_BASE64: ${{ secrets.MINT_ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_BASE64" ]; then
            echo "$KS_BASE64" | base64 -d > /tmp/mint-release.keystore
            echo "path=/tmp/mint-release.keystore" >> "$GITHUB_OUTPUT"
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "No keystore secret configured — skipping release signing."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK (debug)
        run: npx --no-install @tauri-apps/cli android build --debug --apk

      - name: Locate APK
        id: apk
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' | head -n1)
          echo "Found APK: $APK"
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mint-vpn-android-debug-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 14

      - name: Build release APK (signed)
        if: steps.keystore.outputs.available == 'true'
        env:
          ANDROID_KEYSTORE: ${{ steps.keystore.outputs.path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.MINT_ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.MINT_ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.MINT_ANDROID_KEY_PASSWORD }}
        run: npx --no-install @tauri-apps/cli android build --apk

      - name: Locate release APK
        id: release-apk
        if: steps.keystore.outputs.available == 'true'
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk/release -name '*.apk' 2>/dev/null | head -n1 || true)
          APK=${APK:-$(find src-tauri/gen/android/app/build/outputs/apk -name '*-release*.apk' 2>/dev/null | head -n1 || true)}
          if [ -n "$APK" ]; then
            echo "Found release APK: $APK"
            echo "path=$APK" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "No release APK found"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release APK artifact
        if: steps.release-apk.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mint-vpn-android-release-apk
          path: ${{ steps.release-apk.outputs.path }}
          if-no-files-found: warn
          retention-days: 30

      - name: Build AAB (release)
        if: steps.keystore.outputs.available == 'true'
        env:
          ANDROID_KEYSTORE: ${{ steps.keystore.outputs.path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.MINT_ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.MINT_ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.MINT_ANDROID_KEY_PASSWORD }}
        run: npx --no-install @tauri-apps/cli android build --aab

      - name: Build AAB (debug-signed, no secrets)
        if: steps.keystore.outputs.available != 'true'
        run: npx --no-install @tauri-apps/cli android build --aab || true

      - name: Locate AAB
        id: aab
        run: |
          AAB=$(find src-tauri/gen/android/app/build/outputs/bundle -name '*.aab' 2>/dev/null | head -n1 || true)
          if [ -n "$AAB" ]; then
            echo "Found AAB: $AAB"
            echo "path=$AAB" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "No AAB produced (release signing config likely missing)."
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload AAB artifact
        if: steps.aab.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mint-vpn-android-release-aab
          path: ${{ steps.aab.outputs.path }}
          if-no-files-found: warn
          retention-days: 30

      - name: Rename artifacts for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "${{ steps.release-apk.outputs.found }}" = "true" ]; then
            cp "${{ steps.release-apk.outputs.path }}" "mint-vpn-${TAG}.apk"
          fi
          if [ "${{ steps.aab.outputs.found }}" = "true" ]; then
            cp "${{ steps.aab.outputs.path }}" "mint-vpn-${TAG}.aab"
          fi

      # Mark Android releases as `prerelease=true`. Without this, the
      # `/releases/latest` API/redirect picks the most recently published
      # release regardless of OS, and Android tags would shadow the
      # latest Windows release — breaking the desktop updater (which
      # fetches `/releases/latest/download/latest.json` and 404s when
      # the latest release is an Android one). Marking Android tags as
      # prerelease keeps them out of the "latest" pool while still
      # reachable by tag URL and by the in-app Android updater (which
      # iterates all releases looking for `v*-android` tags).
      #
      # We previously had a separate `mark-android-prerelease.yml`
      # workflow that flipped this flag after publish, but `release`
      # events fired from GITHUB_TOKEN-authored API calls deliberately
      # do NOT trigger downstream workflows, so it never ran. Setting
      # `prerelease: true` here is the deterministic fix.
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            mint-vpn-*.apk
            mint-vpn-*.aab
